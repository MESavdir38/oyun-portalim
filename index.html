<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ateş ve Su: Tek Kişilik Macera</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: linear-gradient(to right, #ff4500, #1e90ff); padding: 30px; border-bottom: 4px solid #fff; }
        .container { padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: #333; border: 3px solid #ff4500; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); background: #444; box-shadow: 0 10px 20px rgba(255, 69, 0, 0.4); }
        h2 { color: #ff4500; margin-bottom: 10px; }
        p { color: #ccc; }
    </style>
</head>
<body>
    <header>
        <h1>🔥 Ateş ve Su: Tek Kişilik Macera 💧</h1>
    </header>
    <div class="container">
        <div class="grid">
            <div class="card" onclick="window.location.href='games/game1.html'">
                <h2>Bölüm 1</h2>
                <p>Lav Mağarası (Ateş Karakteri)</p>
                <span>OYNAMAK İÇİN TIKLA</span>
            </div>
            
            </div>
    </div>
</body>
</html>
