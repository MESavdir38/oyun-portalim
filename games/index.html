<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ateş ve Su Portalı</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        header { background: linear-gradient(to right, #ff4500, #1e90ff); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
        .card { border: 2px solid #ff4500; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); background: rgba(255, 69, 0, 0.2); }
        h3 { color: #ff4500; }
    </style>
</head>
<body>
    <header><h1>🔥 Ateş ve Su: Tek Kişilik Macera 💧</h1></header>
    <div class="grid">
        <div class="card" onclick="window.location.href='games/game1.html'">
            <h3>Bölüm 1: Lav Mağarası</h3>
            <p>Maceraya Başla!</p>
        </div>
        </div>
</body>
</html>
