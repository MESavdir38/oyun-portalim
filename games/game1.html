<!DOCTYPE html>
<html>
<head>
    <title>Ateş ve Su: Tek Tabanca</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #222; border: 4px solid #444; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="info">
        <h1>🔥 Ateş ve Su: Macera Başlıyor 💧</h1>
        <p>Hareket: <b>Yön Tuşları / WASD</b> | Zıplama: <b>Boşluk / W / Yukarı</b></p>
        <p>Skor: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Oyun Değişkenleri
let player = { x: 50, y: 300, w: 30, h: 30, dy: 0, speed: 5, jumpPower: -12, grounded: false, color: "#ff4500" };
let gravity = 0.6;
let score = 0;
let keys = {};

// Platformlar (x, y, genişlik, yükseklik, tip)
// Tip: 0 = Normal, 1 = Lav (Ölüm), 2 = Su (Ölüm - Ateş karakteri için)
const platforms = [
    { x: 0, y: 380, w: 200, h: 20, type: 0 },   // Başlangıç
    { x: 250, y: 320, w: 150, h: 20, type: 0 },
    { x: 450, y: 260, w: 150, h: 20, type: 0 },
    { x: 200, y: 385, w: 600, h: 15, type: 1 }, // Lav Denizi
    { x: 650, y: 200, w: 100, h: 20, type: 0 }  // Bitiş yakını
];

// Elmaslar
let diamonds = [
    { x: 300, y: 280, collected: false },
    { x: 500, y: 220, collected: false },
    { x: 680, y: 160, collected: false }
];

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

function update() {
    // Hareket
    if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= player.speed;
    if (keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;
    
    // Zıplama
    if ((keys["ArrowUp"] || keys["KeyW"] || keys["Space"]) && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }

    // Yerçekimi
    player.dy += gravity;
    player.y += player.dy;
    player.grounded = false;

    // Platform Çarpışma Kontrolü
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            
            if (p.type === 1) { // Lava düştü
                resetGame();
            } else if (player.dy > 0) { // Üstüne bastı
                player.y = p.y - player.h;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    // Elmas Toplama
    diamonds.forEach(d => {
        if (!d.collected && player.x < d.x + 15 && player.x + player.w > d.x &&
            player.y < d.y + 15 && player.y + player.h > d.y) {
            d.collected = true;
            score += 10;
            document.getElementById("score").innerText = score;
        }
    });

    // Ekran dışına çıkma (Düşme)
    if (player.y > canvas.height) resetGame();

    draw();
    requestAnimationFrame(update);
}

function resetGame() {
    player.x = 50;
    player.y = 300;
    player.dy = 0;
    score = 0;
    document.getElementById("score").innerText = score;
    diamonds.forEach(d => d.collected = false);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Platformları Çiz
    platforms.forEach(p => {
        ctx.fillStyle = p.type === 1 ? "#ff0000" : "#555";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        if(p.type === 1) { // Lav efekti
            ctx.shadowBlur = 10;
            ctx.shadowColor = "red";
        } else {
            ctx.shadowBlur = 0;
        }
    });

    // Elmasları Çiz
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#00ffff";
    diamonds.forEach(d => {
        if (!d.collected) {
            ctx.beginPath();
            ctx.moveTo(d.x + 7.5, d.y);
            ctx.lineTo(d.x + 15, d.y + 7.5);
            ctx.lineTo(d.x + 7.5, d.y + 15);
            ctx.lineTo(d.x, d.y + 7.5);
            ctx.fill();
        }
    });

    // Oyuncuyu Çiz (Ateş Karakteri)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Gözler
    ctx.fillStyle = "white";
    ctx.fillRect(player.x + 18, player.y + 5, 5, 5);
}

update();
</script>
</body>
</html>
