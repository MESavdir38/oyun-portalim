<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Klasik Yılan Oyunu</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #00ff88;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background-color: #000;
        }
        .ui {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2em; }
        .score { font-size: 1.5em; color: #fff; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>YILAN OYUNU</h1>
        <div class="score">Skor: <span id="scoreVal">0</span></div>
    </div>

    <canvas id="snakeGame" width="400" height="400"></canvas>

    <div style="margin-top: 20px; color: #888;">Yön tuşlarını kullanarak oyna!</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const box = 20; // Kare boyutu
        let score = 0;
        let gameSpeed = 100; // Milisaniye cinsinden hız

        // Yılanın başlangıç konumu (orta)
        let snake = [];
        snake[0] = { x: 9 * box, y: 10 * box };

        // Yem oluşturma
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d;

        // Kontroller
        document.addEventListener("keydown", direction);

        function direction(event) {
            let key = event.keyCode;
            if(key == 37 && d != "RIGHT") d = "LEFT";
            else if(key == 38 && d != "DOWN") d = "UP";
            else if(key == 39 && d != "LEFT") d = "RIGHT";
            else if(key == 40 && d != "UP") d = "DOWN";
        }

        // Çarpışma kontrolü
        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        // Çizim fonksiyonu
        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yılanı çiz
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff88" : "#ffffff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                
                // Karelere çerçeve ekle
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Yemi çiz
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            // Eski kafa konumu
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Yöne göre hareket ettir
            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Yılan yemi yerse
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                // Kuyruğu çıkar
                snake.pop();
            }

            // Yeni kafa
            let newHead = { x: snakeX, y: snakeY };

            // Oyun bitti kuralları (Duvara çarpma veya kendine
